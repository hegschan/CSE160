<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>asg0 — vectors on canvas</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <div>
      <label>v1 x <input type="text" id="v1x" value="2.25" /></label>
      <label>v1 y <input type="text" id="v1y" value="2.25" /></label>
      <label>v2 x <input type="text" id="v2x" value="0" /></label>
      <label>v2 y <input type="text" id="v2y" value="0" /></label>
      <input type="button" id="drawVectorsBtn" value="Draw" />
    </div>

    <div>
      <label>
        Operation
        <select id="operation">
          <option value="add">Add</option>
          <option value="sub">Subtract</option>
          <option value="mul">Multiply</option>
          <option value="div">Divide</option>
          <option value="magnitude">Magnitude</option>
          <option value="normalize">Normalize</option>
          <option value="angle">Angle between</option>
          <option value="area">Area</option>
        </select>
      </label>
      <label>Scalar <input type="text" id="scalar" value="1" /></label>
      <input type="button" id="drawOperationBtn" value="Draw operation" />
    </div>

    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
